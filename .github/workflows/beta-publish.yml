name: Nuxt CI/CD

on:
  push:
    branches:
      - master

jobs:
  # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      # Build Nuxt app
      - name: Build Nuxt Application
        run: npm run build